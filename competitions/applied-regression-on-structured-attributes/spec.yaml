id: applied-regression-on-structured-attributes
task_type: regression

# NOTE: This competition requires accepting Kaggle rules before data download works via CLI.
# If `prepare_competition.py --download` fails with 403 Forbidden, open the competition page in a browser,
# accept the rules, then rerun.
#
# Column assumptions (adjust if the downloaded CSV differs):
target_column: target
id_column: id

metric:
  name: rmse
  higher_is_better: false

submission:
  filename: submission.csv
  prediction_column: target

split:
  strategy: random
  test_size: 0.2
  seed: 1337

budgets:
  time_seconds: 600

prepare:
  raw_train_path: raw/train.csv

