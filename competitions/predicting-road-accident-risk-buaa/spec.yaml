id: predicting-road-accident-risk-buaa
task_type: binary

# NOTE: Column names are inferred from downloaded data by prepare_competition.py on first run.
target_column: __INFER__
id_column: __INFER__

metric:
  name: auc
  higher_is_better: true

submission:
  filename: submission.csv
  prediction_column: __INFER__

split:
  strategy: stratified
  test_size: 0.2
  seed: 1337

budgets:
  time_seconds: 600

prepare:
  raw_train_path: raw/train.csv

